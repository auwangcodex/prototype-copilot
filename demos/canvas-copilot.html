<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Canvas Copilot — AI-Powered LMS Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --color-primary: #0374B5;
    --color-primary-dark: #025D91;
    --color-on-primary: #FFFFFF;
    --color-secondary: #394B58;
    --color-ai-accent: #7C3AED;
    --color-ai-accent-light: #EDE9FE;
    --color-background: #F5F5F5;
    --color-surface: #FFFFFF;
    --color-foreground: #2D3B45;
    --color-muted: #6B7780;
    --color-border: #E8E8E8;
    --color-success: #0B874B;
    --color-warning: #FC5E13;
    --color-destructive: #EE0612;
    --color-hbs: #A51C30;
  }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Lato', -apple-system, sans-serif;
    background: var(--color-background);
    color: var(--color-foreground);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    height: 52px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    width: 28px;
    height: 28px;
    background: var(--color-hbs);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 8px;
    font-weight: 700;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--color-foreground);
  }
  .header-ai-badge {
    font-size: 9px;
    font-weight: 600;
    color: var(--color-ai-accent);
    background: var(--color-ai-accent-light);
    padding: 2px 6px;
    border-radius: 8px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 28px;
    height: 28px;
    background: var(--color-primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    font-weight: 600;
  }
  .notif-dot {
    width: 8px;
    height: 8px;
    background: var(--color-destructive);
    border-radius: 50%;
  }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Briefing cards */
  .briefing-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .briefing-cards {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .briefing-card {
    background: var(--color-surface);
    border-radius: 8px;
    padding: 10px 12px;
    border-left: 3px solid;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .briefing-card.urgent { border-left-color: var(--color-destructive); }
  .briefing-card.warning { border-left-color: var(--color-warning); }
  .briefing-card.upcoming { border-left-color: var(--color-primary); }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 10px;
    color: var(--color-muted);
  }
  .card-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    color: white;
    flex-shrink: 0;
  }
  .badge-bgie { background: #3B5998; }
  .badge-dsail { background: #2D6987; }
  .badge-rchq { background: #8B6914; }
  .badge-cap { background: #6B4C2A; }

  /* Chat input */
  .chat-input-wrapper {
    background: var(--color-surface);
    border-radius: 20px;
    border: 1.5px solid var(--color-border);
    display: flex;
    align-items: center;
    padding: 0 4px 0 14px;
    transition: border-color 200ms;
  }
  .chat-input-wrapper:focus-within {
    border-color: var(--color-primary);
  }
  .chat-input {
    flex: 1;
    padding: 10px 0;
    border: none;
    outline: none;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    background: transparent;
    color: var(--color-foreground);
  }
  .chat-input::placeholder { color: #B0B8BF; }
  .chat-send {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--color-primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chat-send svg { width: 14px; height: 14px; color: white; }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    padding: 6px 10px;
    border-radius: 14px;
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    font-size: 11px;
    color: var(--color-foreground);
    cursor: pointer;
    transition: all 150ms;
    font-family: 'Lato', sans-serif;
  }
  .chip:hover {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
  }

  /* Chat messages */
  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    display: flex;
    gap: 8px;
    max-width: 90%;
    animation: fadeInUp 300ms ease-out;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .message-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .message.ai .message-avatar {
    background: var(--color-ai-accent);
    color: white;
  }
  .message.user .message-avatar {
    background: var(--color-primary);
    color: white;
  }
  .message-bubble {
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.6;
  }
  .message.ai .message-bubble {
    background: var(--color-ai-accent-light);
    color: var(--color-foreground);
    border-top-left-radius: 4px;
  }
  .message.user .message-bubble {
    background: var(--color-primary);
    color: white;
    border-top-right-radius: 4px;
  }
  .message-bubble a {
    color: var(--color-primary-dark);
    font-weight: 600;
    text-decoration: none;
  }
  .message-bubble strong { font-weight: 600; }
  .message-bubble ul, .message-bubble ol {
    margin: 4px 0;
    padding-left: 16px;
  }
  .message-bubble li { margin-bottom: 2px; }
  .message-bubble .source-tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 9px;
    color: var(--color-muted);
    background: rgba(0,0,0,0.04);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 10px 12px;
    align-items: center;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-ai-accent);
    opacity: 0.4;
    animation: typingPulse 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Demo bar */
  .demo-bar {
    background: var(--color-secondary);
    padding: 8px 10px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    flex-shrink: 0;
  }
  .demo-btn {
    padding: 6px 0;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-size: 10px;
    font-family: 'Lato', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 150ms;
    text-align: center;
  }
  .demo-btn:hover { background: rgba(255,255,255,0.1); color: white; }
  .demo-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">HBS</div>
    <span class="header-title">Canvas Copilot</span>
    <span class="header-ai-badge">AI</span>
  </div>
  <div class="header-right">
    <div class="notif-dot"></div>
    <div class="avatar">AW</div>
  </div>
</header>

<!-- Scrollable content -->
<div class="content" id="content">

  <!-- Briefing -->
  <span class="briefing-label">Priority Briefing</span>
  <div class="briefing-cards">
    <div class="briefing-card urgent">
      <div class="card-info">
        <div class="card-title">Final Exam Guidelines</div>
        <div class="card-meta">Due today 8:30 AM</div>
      </div>
      <span class="card-badge badge-bgie">BGIE</span>
    </div>
    <div class="briefing-card warning">
      <div class="card-info">
        <div class="card-title">Final Project Submission</div>
        <div class="card-meta">Due tomorrow 5:00 PM — Not submitted</div>
      </div>
      <span class="card-badge badge-dsail">DSAIL</span>
    </div>
    <div class="briefing-card warning">
      <div class="card-info">
        <div class="card-title">RC Final Reflections</div>
        <div class="card-meta">Due tomorrow 11:59 PM</div>
      </div>
      <span class="card-badge badge-rchq">RCHQ</span>
    </div>
    <div class="briefing-card upcoming">
      <div class="card-info">
        <div class="card-title">Faculty/Team Meetings</div>
        <div class="card-meta">Apr 30 — Individual times vary</div>
      </div>
      <span class="card-badge badge-cap">CAP</span>
    </div>
  </div>

  <!-- Chat input -->
  <div class="chat-input-wrapper">
    <input class="chat-input" id="chatInput" placeholder="Ask about your courses..." />
    <button class="chat-send" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <!-- Chips -->
  <div class="chips" id="chips">
    <button class="chip" onclick="handleChip('What\'s due this week?')">What's due this week?</button>
    <button class="chip" onclick="handleChip('DSAIL final project requirements')">DSAIL final project</button>
    <button class="chip" onclick="handleChip('What did I miss since Friday?')">What did I miss?</button>
    <button class="chip" onclick="handleChip('How is LCA organized?')">How is LCA organized?</button>
  </div>

  <!-- Chat messages -->
  <div class="chat-messages" id="chatMessages"></div>
</div>

<!-- Demo bar -->
<div class="demo-bar">
  <button class="demo-btn active" onclick="resetDemo(this)">Home</button>
  <button class="demo-btn" onclick="runScenario('file', this)">File</button>
  <button class="demo-btn" onclick="runScenario('orientation', this)">Course</button>
  <button class="demo-btn" onclick="runScenario('catchup', this)">Catch-Up</button>
  <button class="demo-btn" onclick="runScenario('week', this)">Weekly</button>
</div>

<script>
const responses = {
  file: {
    user: "Give me the DSAIL final project requirements",
    ai: `The DSAIL final project instructions are in the <strong>Exam Tool</strong>:<br><br>
<a href="#">Final Project — Exam Tool (DSAIL)</a><br><br>
<strong>Key details:</strong>
<ul>
<li>Submit your <strong>build project</strong>, answers to <strong>3 reflection questions</strong>, and any appendices</li>
<li>Submit as <strong>one PDF</strong> via the Exam Tool</li>
<li><strong>Due: April 29 at 5:00 PM</strong></li>
<li>Not a timed project — submit anytime before the deadline</li>
</ul>
<span class="source-tag">Source: DSAIL > Assignments > Final Project Submission</span>`
  },
  orientation: {
    user: "How is LCA organized? Where do I find readings?",
    ai: `LCA is organized by <strong>Modules</strong>, grouped by stakeholder theme:<br><br>
<strong>Intro</strong> (Classes 1–8): Investors<br>
<strong>Module 2</strong> (Classes 9–14): Customers<br>
<strong>Module 3</strong> (Classes 15+): Employees<br><br>
<strong>To find readings:</strong> Click into each Module — case prep and readings are linked within each class. The <a href="#">Syllabus tab</a> has the full schedule.<br><br>
<span class="source-tag">Source: LCA > Modules</span>`
  },
  catchup: {
    user: "What did I miss since last Friday?",
    ai: `Since <strong>Friday, April 25</strong>:<br><br>
<strong>Action Required:</strong>
<ul>
<li><strong>BGIE</strong> — Final Exam Guidelines, due <strong>today 8:30 AM</strong></li>
<li><strong>DSAIL</strong> — Final Project due <strong>tomorrow 5 PM</strong></li>
<li><strong>RCHQ</strong> — Reflections due <strong>tomorrow 11:59 PM</strong></li>
</ul>
<strong>New Announcements:</strong>
<ul>
<li><strong>LCA</strong> — "Download Course Files" + "Final Exam Tips"</li>
<li><strong>DSAIL</strong> — "Class Tomorrow - Batten 304"</li>
</ul>
<span class="source-tag">Scanned 8 courses · 3 days of activity</span>`
  },
  week: {
    user: "What's due this week?",
    ai: `<strong>Monday (today):</strong>
<ul><li>BGIE — Final Exam Guidelines (8:30 AM)</li></ul>
<strong>Tuesday:</strong>
<ul>
<li>DSAIL — Final Project (5:00 PM) — <em>not submitted</em></li>
<li>RCHQ — RC Reflections (11:59 PM)</li>
</ul>
<strong>Wednesday–Thursday:</strong>
<ul><li>CAP — Faculty/Team Meetings</li></ul>
<strong>Friday–Sunday:</strong> Nothing scheduled<br><br>
<strong>Priority:</strong> DSAIL Final Project is due tomorrow and isn't submitted yet.<br><br>
<span class="source-tag">Aggregated from 8 course calendars</span>`
  }
};

function addMessage(type, content) {
  const messages = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = `message ${type}`;
  msg.innerHTML = `
    <div class="message-avatar">${type === 'ai' ? 'AI' : 'AW'}</div>
    <div class="message-bubble">${content}</div>
  `;
  messages.appendChild(msg);
  scrollToBottom();
}

function addTypingIndicator() {
  const messages = document.getElementById('chatMessages');
  const indicator = document.createElement('div');
  indicator.className = 'message ai';
  indicator.id = 'typingIndicator';
  indicator.innerHTML = `
    <div class="message-avatar">AI</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(indicator);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollToBottom() {
  const content = document.getElementById('content');
  setTimeout(() => content.scrollTop = content.scrollHeight, 50);
}

function runScenario(key, el) {
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('chatMessages').innerHTML = '';

  const scenario = responses[key];
  if (!scenario) return;

  document.getElementById('chips').classList.add('hidden');
  addMessage('user', scenario.user);

  setTimeout(() => {
    addTypingIndicator();
    setTimeout(() => {
      removeTypingIndicator();
      addMessage('ai', scenario.ai);
    }, 1200);
  }, 400);
}

function handleChip(text) {
  document.getElementById('chatInput').value = '';
  document.getElementById('chips').classList.add('hidden');

  let key = 'week';
  if (text.includes('DSAIL')) key = 'file';
  else if (text.includes('miss')) key = 'catchup';
  else if (text.includes('LCA')) key = 'orientation';

  addMessage('user', text);
  setTimeout(() => {
    addTypingIndicator();
    setTimeout(() => {
      removeTypingIndicator();
      addMessage('ai', responses[key].ai);
    }, 1200);
  }, 400);
}

function handleSend() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('chips').classList.add('hidden');

  addMessage('user', text);

  const lower = text.toLowerCase();
  let key = null;
  if (lower.includes('dsail') || lower.includes('final project') || lower.includes('requirement')) key = 'file';
  else if (lower.includes('lca') || lower.includes('organized') || lower.includes('reading')) key = 'orientation';
  else if (lower.includes('miss') || lower.includes('catch up') || lower.includes('since')) key = 'catchup';
  else if (lower.includes('due') || lower.includes('week') || lower.includes('deadline')) key = 'week';

  setTimeout(() => {
    addTypingIndicator();
    setTimeout(() => {
      removeTypingIndicator();
      if (key && responses[key]) {
        addMessage('ai', responses[key].ai);
      } else {
        addMessage('ai', `I'd search across your 8 enrolled courses for "<strong>${text}</strong>". In the full version, I'd index all files, pages, assignments, and announcements.<br><br><em>Try one of the demo scenarios to see a full response.</em>`);
      }
    }, 1200);
  }, 400);
}

function resetDemo(el) {
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chips').classList.remove('hidden');
  document.getElementById('content').scrollTop = 0;
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSend();
});
</script>
</body>
</html>
