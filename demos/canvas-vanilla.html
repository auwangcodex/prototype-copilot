<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Canvas AI Assistant — Vanilla Claude Code (No Skills)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; overflow: hidden; }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/*
 * VANILLA VERSION — Built by prompting Claude Code with:
 * "Build me an AI chatbot for Canvas LMS students"
 * No research. No design spec. No persona. No behavioral framework.
 * Generic UI, placeholder responses, no real product understanding.
 */

function App() {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: 'Hi! I\'m your Canvas AI Assistant. How can I help you today?' }
  ]);
  const [input, setInput] = useState('');
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const genericResponses = [
    "I can help you with that! Please check your Canvas dashboard for more details.",
    "That's a great question. You can find that information in your course modules.",
    "I'd recommend checking the announcements section for the latest updates.",
    "Let me help you with that. Try navigating to the assignments tab.",
    "Sure! You can access that through the course navigation menu on the left.",
  ];

  const handleSend = () => {
    if (!input.trim()) return;
    const userMsg = { role: 'user', text: input };
    const botMsg = { role: 'assistant', text: genericResponses[Math.floor(Math.random() * genericResponses.length)] };
    setMessages(prev => [...prev, userMsg, botMsg]);
    setInput('');
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#fff' }}>
      {/* Header */}
      <div style={{ background: '#2D3B45', color: '#fff', padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ width: 36, height: 36, borderRadius: '50%', background: '#E74C3C', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>
          C
        </div>
        <div>
          <div style={{ fontWeight: 600, fontSize: 16 }}>Canvas AI</div>
          <div style={{ fontSize: 12, opacity: 0.7 }}>Online</div>
        </div>
      </div>

      {/* Chat */}
      <div ref={chatRef} style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
            <div style={{
              maxWidth: '75%',
              padding: '10px 14px',
              borderRadius: 12,
              fontSize: 14,
              lineHeight: 1.5,
              background: m.role === 'user' ? '#2D3B45' : '#f0f0f0',
              color: m.role === 'user' ? '#fff' : '#333',
            }}>
              {m.text}
            </div>
          </div>
        ))}
      </div>

      {/* Input */}
      <div style={{ borderTop: '1px solid #eee', padding: 12, display: 'flex', gap: 8 }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSend()}
          placeholder="Ask anything..."
          style={{ flex: 1, padding: '10px 14px', border: '1px solid #ddd', borderRadius: 20, fontSize: 14, outline: 'none' }}
        />
        <button
          onClick={handleSend}
          style={{ padding: '10px 16px', background: '#2D3B45', color: '#fff', border: 'none', borderRadius: 20, fontSize: 14, cursor: 'pointer' }}
        >
          Send
        </button>
      </div>

      {/* Limitations label */}
      <div style={{ padding: '8px 16px', textAlign: 'center', fontSize: 11, color: '#999', borderTop: '1px solid #f0f0f0' }}>
        No research grounding. Generic responses. No persona-aware design.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
